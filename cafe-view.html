<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe照 出勤表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f5f0e8;color:#1e1810;min-height:100vh;}
.hdr{background:#1e1810;color:#f5f0e8;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:1.1rem;font-weight:700;color:#e8a060;}
.logo-sub{font-size:.62rem;color:#8a7a60;margin-left:6px;}
.reload-btn{background:rgba(255,255,255,.15);border:none;color:#f5f0e8;padding:6px 12px;border-radius:6px;font-size:.72rem;font-family:inherit;cursor:pointer;}
.info{font-size:.62rem;color:#8a7a60;text-align:right;margin-top:2px;}
.content{padding:12px;}
.half-block{background:#fff;border:1px solid #ddd0b8;border-radius:10px;padding:12px;margin-bottom:14px;overflow-x:auto;}
.half-title{font-size:.82rem;font-weight:700;color:#b8622a;margin-bottom:8px;}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;font-size:.65rem;color:#8a7a60;padding:8px 12px;background:#f5f0e8;border-radius:6px;}
.saved{font-size:.65rem;color:#8a7a60;text-align:center;padding:8px;margin-bottom:8px;}
.loading{text-align:center;padding:50px;color:#8a7a60;font-size:.85rem;}
.nodata{text-align:center;padding:40px 20px;color:#8a7a60;font-size:.82rem;line-height:2.2;background:#fff;border-radius:10px;border:1px solid #ddd0b8;}
/* table styles */
table{border-collapse:collapse;width:100%;font-size:.7rem;}
th,td{border:1px solid #ddd0b8;text-align:center;padding:3px 2px;}
th{background:#f5f0e8;font-weight:600;}
@media print{
  .hdr,.reload-btn,.legend{display:none!important;}
  body{background:#fff;padding:4px;}
  .half-block{border:none;padding:4px;margin-bottom:0;page-break-after:always;}
  .half-block:last-of-type{page-break-after:auto;}
  @page{size:A4 landscape;margin:8mm;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <span class="logo">Cafe照</span>
    <span class="logo-sub">出勤表</span>
  </div>
  <div style="text-align:right">
    <button class="reload-btn" onclick="loadData()">🔄 更新</button>
    <div class="info" id="info">読み込み中...</div>
  </div>
</div>

<div class="content">
  <div id="content"><div class="loading">📊 出勤表を読み込んでいます...</div></div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbzVretuyWf7A5QZEdQM8D2gbHi24t_NWm5U1U00VmXqjziSNi4EWLqnBnefE9c-KjKS/exec';

function show(d){
  document.title='Cafe照 '+d.title;
  let h='';
  h+=`<div class="saved">📅 ${d.title}　作成日時：${d.savedAt||''}　<button onclick="window.print()" style="background:#3a8a5a;color:#fff;border:none;border-radius:5px;padding:4px 12px;font-family:inherit;font-size:.72rem;cursor:pointer">🖨 印刷</button></div>`;
  h+=`<div class="half-block"><div class="half-title">前半（1〜15日）</div>${d.half1HTML||''}</div>`;
  h+=`<div class="half-block"><div class="half-title">後半（16〜${d.daysIn||'末'}日）</div>${d.half2HTML||''}</div>`;
  if(d.legendHTML){
    h+=`<div class="legend">${d.legendHTML}<span style="margin-right:8px"><b style="color:#c03030">✕</b> 欠勤希望</span><span>□ 未アサイン</span></div>`;
  }
  document.getElementById('content').innerHTML=h;
  document.getElementById('info').textContent='更新：'+(d.savedAt||'');
}

function showNoData(){
  document.getElementById('content').innerHTML=`<div class="nodata">
    ⚠ まだ出勤表が作成されていません。<br><br>
    オーナーが以下の操作をすると表示されます：<br>
    「📊 月間出勤表」タブを開く<br>↓<br>
    「📤 出勤表を共有」ボタンをタップ<br><br>
    その後このページを「🔄 更新」してください。
  </div>`;
  document.getElementById('info').textContent='データなし';
}

async function loadData(){
  document.getElementById('info').textContent='読み込み中...';
  // ローカルキャッシュを先に表示
  try{
    const lc=localStorage.getItem('cafeViewData');
    if(lc){ const d=JSON.parse(lc); if(d&&d.title) show(d); }
  }catch(e){}
  // GASから最新取得
  try{
    const r=await fetch(GAS+'?t='+Date.now(),{redirect:'follow',cache:'no-cache'});
    const text=await r.text();
    const start=text.indexOf('{'),end=text.lastIndexOf('}');
    if(start<0)throw new Error('no data');
    const data=JSON.parse(text.slice(start,end+1));
    if(data.viewData&&data.viewData.title){
      localStorage.setItem('cafeViewData',JSON.stringify(data.viewData));
      show(data.viewData);
    } else {
      const lc=localStorage.getItem('cafeViewData');
      if(!lc) showNoData();
    }
  }catch(e){
    document.getElementById('info').textContent='オフライン（キャッシュ表示）';
    const lc=localStorage.getItem('cafeViewData');
    if(!lc) showNoData();
  }
}
loadData();
</script>
</body>
</html>
